name: Build & Push to Docker Hub

on:
  push:
    branches: [main]

jobs:
  detect:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      phoenix: ${{ steps.filter.outputs.phoenix }}
      falcon: ${{ steps.filter.outputs.falcon }}
      dolphin: ${{ steps.filter.outputs.dolphin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            phoenix:
              - 'apps/phoenix/**'
            falcon:
              - 'apps/falcon/**'
            dolphin:
              - 'apps/dolphin/**'

  build-phoenix:
    name: Build & Push phoenix
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.phoenix == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/phoenix/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pegasus-phoenix:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pegasus-phoenix:${{ github.sha }}
          cache-from: type=gha,scope=phoenix
          cache-to: type=gha,scope=phoenix,mode=max

  build-falcon:
    name: Build & Push falcon
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.falcon == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/falcon/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pegasus-falcon:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pegasus-falcon:${{ github.sha }}
          cache-from: type=gha,scope=falcon
          cache-to: type=gha,scope=falcon,mode=max
          build-args: |
            NEXT_PUBLIC_PHOENIX_URL=${{ secrets.NEXT_PUBLIC_PHOENIX_URL }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}

  build-dolphin:
    name: Build & Push dolphin
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.dolphin == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/dolphin/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pegasus-dolphin:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pegasus-dolphin:${{ github.sha }}
          cache-from: type=gha,scope=dolphin
          cache-to: type=gha,scope=dolphin,mode=max
          build-args: |
            NEXT_PUBLIC_PHOENIX_URL=${{ secrets.NEXT_PUBLIC_PHOENIX_URL }}
