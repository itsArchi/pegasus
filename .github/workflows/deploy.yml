name: Build & Push to Docker Hub

on:
  push:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build:
    name: Build & Push ${{ matrix.app }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [phoenix, falcon, dolphin]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pegasus-${{ matrix.app }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pegasus-${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
          build-args: |
            NEXT_PUBLIC_PHOENIX_URL=${{ secrets.NEXT_PUBLIC_PHOENIX_URL }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
